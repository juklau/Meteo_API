services:
  web:
    image: httpd:2.4
    container_name: meteo-klaudia-web
    restart: unless-stopped
    expose:
      - "80"
    volumes:
      - ./:/usr/local/apache2/htdocs/:ro
    networks:
      - admin_proxy
    labels:
      traefik.enable: "true"
      traefik.docker.network: admin_proxy

      # Redirect HTTP -> HTTPS:4433 (NAT FortiGate)
      traefik.http.middlewares.meteo-klaudia-https-redirect.redirectregex.regex: "^http://meteo-klaudia\\.iris\\.a3n\\.fr(.*)"
      traefik.http.middlewares.meteo-klaudia-https-redirect.redirectregex.replacement: "https://meteo-klaudia.iris.a3n.fr:4433$$1"
      traefik.http.middlewares.meteo-klaudia-https-redirect.redirectregex.permanent: "true"

      # Routeur HTTP (redirection vers HTTPS)
      traefik.http.routers.meteo-klaudia-http.entrypoints: web
      traefik.http.routers.meteo-klaudia-http.rule: "Host(`meteo-klaudia.iris.a3n.fr`)"
      traefik.http.routers.meteo-klaudia-http.middlewares: meteo-klaudia-https-redirect
      traefik.http.routers.meteo-klaudia-http.service: meteo-klaudia-svc

      # Routeur HTTPS
      traefik.http.routers.meteo-klaudia.entrypoints: websecure
      traefik.http.routers.meteo-klaudia.rule: "Host(`meteo-klaudia.iris.a3n.fr`)"
      traefik.http.routers.meteo-klaudia.tls: "true"
      traefik.http.routers.meteo-klaudia.tls.certresolver: letsencrypt
      traefik.http.routers.meteo-klaudia.service: meteo-klaudia-svc
      traefik.http.routers.meteo-klaudia.middlewares: meteo-klaudia-security

      # Service
      traefik.http.services.meteo-klaudia-svc.loadbalancer.server.port: "80"

      # Security headers
      traefik.http.middlewares.meteo-klaudia-security.headers.stsSeconds: "31536000"
      traefik.http.middlewares.meteo-klaudia-security.headers.stsIncludeSubdomains: "true"
      traefik.http.middlewares.meteo-klaudia-security.headers.stsPreload: "true"
      traefik.http.middlewares.meteo-klaudia-security.headers.forceSTSHeader: "true"
      traefik.http.middlewares.meteo-klaudia-security.headers.contentTypeNosniff: "true"
      traefik.http.middlewares.meteo-klaudia-security.headers.browserXssFilter: "true"

networks:
  admin_proxy:
    external: true
